version: '3.0'
services:
  nginx:
    image: nginx:1.22
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf
      - ./public:/public
    ports:
      - "80:80"
    depends_on:
      - webapp

  webapp:
    build: ./webapp/java
    environment:
      ISUCON_DB_HOST: mysql
      ISUCON_DB_PORT: 3306
      ISUCON_DB_USER: isucon
      ISUCON_DB_PASSWORD: isucon
      ISUCON_DB_NAME: isuports
      ISUCON_ADMIN_HOSTNAME: admin.t.isucon.dev
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    volumes:
      - ./webapp/tenant_db:/home/isucon/webapp/tenant_db
      - ./webapp/sql:/home/isucon/webapp/sql
      - ./webapp/java/public.pem:/home/isucon/webapp/public.pem:ro
      - ./initial_data:/home/isucon/initial_data
    init: true

  mysql:
    image: mysql/mysql-server:8.0.31
    environment:
      - "MYSQL_ROOT_HOST=%"
      - "MYSQL_ROOT_PASSWORD=root"
    volumes:
      - ./webapp/sql/admin/:/docker-entrypoint-initdb.d
      - mysql:/var/lib/mysql
    ports:
      - 13306:3306

volumes:
  mysql:
